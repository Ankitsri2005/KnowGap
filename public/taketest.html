<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>knowGap | Take Test</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

  <div class="dashboard-layout" style="display: block; min-height: 100vh;">
    <!-- Top Navigation for Test -->
    <div style="background: var(--bg-card); padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
      <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: clamp(1rem, 4vw, 1.2rem);">knowGap Validation</div>
      <button class="btn btn-secondary btn-sm" onclick="window.location.href='/student.html'">Exit Test</button>
    </div>

    <!-- Main Content for the Test -->
    <main class="container" id="app" style="padding: clamp(16px, 4vw, 40px) clamp(12px, 4vw, 24px); max-width: 900px; margin: 0 auto;">
      <div class="loading-full">
        <div class="spinner"></div>
        <p>Preparing your evaluation...</p>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/test.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = "/login.html";

    const urlParams = new URLSearchParams(window.location.search);
    const subjectId = urlParams.get('subjectId');
    const subjectName = urlParams.get('subjectName');

    document.addEventListener("DOMContentLoaded", () => {
      Router.params = { subjectId, subjectName };
      renderTakeTest({ subjectId, subjectName });
    });
  </script>

</body>

</html>
