<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>knowGap | Teacher Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <header class="mobile-header" id="mobile-header">
        <div class="mobile-header-logo" onclick="window.location.href='/index.html'">know<span class="brand-accent">Gap</span></div>
        <button class="mobile-hamburger" id="mob-hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/index.html'">know<span class="brand-accent">Gap</span></div>
            <div class="sidebar-section">Teacher Menu</div>
            <button class="sidebar-link active" onclick="window.location.reload(); closeSidebar();">
                <span class="icon">📊</span> Class Overview
            </button>
            <div class="sidebar-spacer"></div>
            <div class="sidebar-footer">
                <div id="teacher-name" class="sidebar-user-name">Loading...</div>
                <div class="sidebar-user-role">Teacher Account</div>
                <button class="btn btn-secondary btn-sm btn-full sidebar-logout" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <div class="loading-full">
                <div class="spinner"></div>
                <p>Loading teacher dashboard...</p>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/teacher.js"></script>
    <script src="/js/dashboard-ui.js"></script>
</body>

</html>
