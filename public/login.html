<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>knowGap | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
  <script src="/js/api.js"></script> 
</head>
<body>

  <div class="auth-wrap">
    
    <!-- White glowing card container -->
    <div class="auth-card animate-up">
      
      <div class="auth-logo">
        <div style="font-size: 2.5rem; margin-bottom: 8px;"></div>
        <h1 class="gradient-text">knowGap </h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 6px;">AI-Powered Learning Gap Analysis</p>
      </div>

      <!-- Tab Buttons -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input id="login-email" type="email" class="form-input" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="Your password"/>
        </div>
        <button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="doLogin()">🔐 Login to knowGap</button>
        
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" style="display: none;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="reg-name" type="text" class="form-input" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input id="reg-email" type="email" class="form-input" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" class="form-input" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label class="form-label">I am a...</label>
          <select id="reg-role" class="form-input form-select">
            <option value="student">👨‍🎓 Student</option>
            <option value="teacher">👩‍🏫 Teacher</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full btn-lg" id="btn-register" onclick="doRegister()">🚀 Create My Account</button>
      </div>

      <p style="text-align: center; margin-top: 20px;">
        <a href="/index.html" style="color: var(--primary-light); text-decoration: none; font-size: 0.85rem;">← Back to Home</a>
      </p>

    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Traditional page logic scripts -->
  <script>
    function switchAuthTab(tab) {
      document.getElementById('form-login').style.display = (tab === 'login') ? 'block' : 'none';
      document.getElementById('form-register').style.display = (tab === 'register') ? 'block' : 'none';
      
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      
      if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
      } else {
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
      }
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      if (!email || !password) return alert('Please fill all fields');
      
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      
      try {
        const res = await API.auth.login({ email, password });
        // The API call is defined in js/api.js, we assume it works
        
        // Save the details to browser memory
        localStorage.setItem('user', JSON.stringify(res.user));
        localStorage.setItem('token', res.token);
        
        // Redirect standard HTML link!
        window.location.href = (res.user.role === 'teacher') ? '/teacher.html' : '/student.html';
        
      } catch (e) {
        alert("Error: " + e.message);
        btn.disabled = false;
        btn.textContent = '🔐 Login to knowGap';
      }
    }



    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const role = document.getElementById('reg-role').value;
      
      if (!name || !email || !password) return alert('Please fill all fields');
      
      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      
      try {
        const res = await API.auth.register({ name, email, password, role });
        
        localStorage.setItem('user', JSON.stringify(res.user));
        localStorage.setItem('token', res.token);
        
        // Redirect standard HTML link!
        window.location.href = (res.user.role === 'teacher') ? '/teacher.html' : '/student.html';
      } catch (e) {
        alert("Error: " + e.message);
        btn.disabled = false;
        btn.textContent = '🚀 Create My Account';
      }
    }
  </script>
</body>
</html>
